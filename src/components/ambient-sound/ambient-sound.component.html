<div class="ambient-wrapper">

  <!-- Floating trigger button -->
  <button
    class="ambient-trigger btn-glass-icon"
    [class.ambient-trigger-active]="activeSound() !== null"
    (click)="toggleExpand()"
    [title]="isExpanded() ? 'Cerrar sonidos' : 'Sonidos ambientales'"
    aria-label="Sonidos ambientales">
    @if (activeSound() !== null) {
      <!-- Animated sound wave icon when active -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;">
        <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z" />
        <path d="M15.932 7.757a.75.75 0 011.061 0 6 6 0 010 8.486.75.75 0 01-1.06-1.061 4.5 4.5 0 000-6.364.75.75 0 010-1.061z" />
      </svg>
    } @else {
      <!-- Muted icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;">
        <path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM20.03 5.47a.75.75 0 011.06 1.06L17.56 10.06l3.53 3.53a.75.75 0 11-1.06 1.06L16.5 11.12l-3.53 3.53a.75.75 0 01-1.06-1.06l3.53-3.53-3.53-3.53a.75.75 0 011.06-1.06l3.53 3.53 3.53-3.53z" />
      </svg>
    }
  </button>

  <!-- Expanded panel -->
  @if (isExpanded()) {
    <div class="ambient-panel glass-card">

      <p class="ambient-panel-title">Ambiente</p>

      <!-- Sound grid -->
      <div class="ambient-sounds-grid">
        @for (sound of sounds; track sound.id) {
          <button
            class="ambient-sound-btn"
            [class.ambient-sound-btn-active]="activeSound() === sound.id"
            (click)="toggleSound(sound.id)">
            <span class="ambient-sound-icon">{{ sound.icon }}</span>
            <span class="ambient-sound-name">{{ sound.name }}</span>
          </button>
        }
      </div>

      <!-- Volume slider -->
      <div class="ambient-volume-row">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:14px;height:14px;flex-shrink:0;color:var(--text-secondary)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
        </svg>
        <input
          type="range" min="0" max="100" step="1"
          class="custom-slider ambient-volume-slider"
          [value]="volume()"
          (input)="onVolumeChange($event)"
        />
        <span class="ambient-volume-label">{{ volume() }}%</span>
      </div>

    </div>
  }

</div>
